<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg" style="max-width: 600px;">
        <div class="card-header bg-danger text-white text-center">
            🚧 Under Construction 🚧
        </div>
        <div class="card-body text-center">
            <h5 class="card-title">The page will be open at:</h5>
            <p class="card-text fs-4 text-primary">{{ uc_duration }}</p>
            <h5 class="card-title mt-3">Reason:</h5>
            <p class="card-text fs-5 text-muted">{{ uc_note }}</p>
        </div>
        <div class="card-footer text-center text-secondary">
            Thank you for your patience 🙏
        </div>
    </div>

    <!-- Bootstrap JS (optional for components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
