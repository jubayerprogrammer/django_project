<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Candidate Portal{% endblock title %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f0f2f5; /* Light grey background */
            min-height: 100vh;
        }
        
        
        .custom-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        
        .left-scroll-area {
            max-height: 85vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        
        .sticky-form {
            position: sticky;
            top: 20px;
        }

       
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 py-3 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <span class="text-primary">System Engineer</span> CANDIDATE
            </a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-white">Welcome, Admin</span>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row g-4">
            
            <div class="col-lg-7 col-md-12">
                <div class="bg-white p-4 custom-card left-scroll-area">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold mb-0 text-secondary">Candidate Form</h4>
                        <span class="badge bg-primary rounded-pill"></span>
                    </div>
                    
                    <hr>

                    {% block left %}
                        <p class="text-muted text-center py-5">No candidates found in the list.</p>
                    {% endblock left %}
                </div>
            </div>

            <div class="col-lg-5 col-md-12">
                <div class="bg-white p-4 custom-card sticky-form border-top border-primary border-4">
                    <h4 class="fw-bold mb-4 text-dark">Click the candidate list for more information </h4>
                    
                    {% block right %}
                        <p class="text-muted small">Please fill up the form to register a new candidate.</p>
                    {% endblock right %}
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
